twig:
    file_name_pattern: '*.twig'
    globals:
        # Глобальные переменные для Twig
    date:
        format: 'd.m.Y H:i'
        timezone: 'Europe/Moscow'
    number_format:
        decimals: 2
        decimal_point: ','
        thousands_separator: ' '

when@test:
    twig:
        strict_variables: true

when@prod:
    twig:
        # Enable strict variables in production to catch errors
        strict_variables: true
        # Auto-reload disabled in production for performance
        auto_reload: false
        # Maximum optimization level
        optimizations: -1
