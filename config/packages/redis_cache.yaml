# Redis Cache Configuration
# Использование: composer require predis/predis
#
# Настройка Redis:
# 1. Установите Redis: https://redis.io/download
# 2. Запустите: redis-server
# 3. Проверьте: redis-cli ping (должен вернуть PONG)
# 4. Обновите .env: REDIS_URL=redis://localhost:6379

framework:
    cache:
        # По умолчанию используем array (in-memory) для dev
        app: cache.adapter.array
        system: cache.adapter.array

# Production конфигурация с Redis
when@prod:
    framework:
        cache:
            # Redis для production
            app: cache.adapter.redis
            system: cache.adapter.redis
            default_redis_provider: '%env(resolve:REDIS_URL)%'

# Test конфигурация
when@test:
    framework:
        cache:
            app: cache.adapter.array
            system: cache.adapter.array
