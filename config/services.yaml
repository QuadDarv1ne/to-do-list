parameters:
    uploads_directory: '%kernel.project_dir%/public/uploads'
    app.mail_from_address: 'noreply@todolist.local'
    app.mail_from_name: 'Task Management System'
    meilisearch_url: '%env(MEILISEARCH_URL)%'
    meilisearch_key: '%env(MEILISEARCH_KEY)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            $projectDir: '%kernel.project_dir%'
            $kernelProjectDir: '%kernel.project_dir%'
            $uploadsDirectory: '%uploads_directory%'
            $environment: '%kernel.environment%'
            $fromEmail: '%app.mail_from_address%'
            $fromName: '%app.mail_from_name%'

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Alias for ContainerInterface to allow autowiring
    Symfony\Component\DependencyInjection\ContainerInterface: '@service_container'

    # Alias for Google Authenticator to allow autowiring
    Scheb\TwoFactorBundle\Security\TwoFactor\Provider\Google\GoogleAuthenticatorInterface: '@scheb_two_factor.security.google_authenticator'

    # Rate Limiter для API - используем конкретные лимитеры
    App\EventListener\RateLimitListener:
        arguments:
            $apiGlobalLimiter: '@limiter.api_global'
            $apiCreateLimiter: '@limiter.api_create'
            $authenticationLimiter: '@limiter.authentication'

    App\EventListener\RateLimitResponseListener:
        arguments:
            $apiGlobalLimiter: '@limiter.api_global'

    # Screenshot Service
    App\Service\ScreenshotService:
        arguments:
            $projectRoot: '%kernel.project_dir%'
            $screenshotApiUrl: '%env(resolve:SCREENSHOT_API_URL)%'
            $screenshotApiKey: '%env(resolve:SCREENSHOT_API_KEY)%'

    # Meilisearch Service
    App\Service\MeilisearchService:
        arguments:
            $meilisearchUrl: '%env(MEILISEARCH_URL)%'
            $meilisearchKey: '%env(MEILISEARCH_KEY)%'

    # Exception Handler для API
    App\EventListener\ApiExceptionListener:
        arguments:
            $environment: '%kernel.environment%'
        tags:
            - { name: 'kernel.event_listener', event: 'kernel.exception', priority: 0 }

    # Security Validation Listener
    App\EventListener\SecurityValidationListener:
        tags:
            - { name: 'kernel.event_subscriber' }
