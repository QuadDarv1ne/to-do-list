<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Скриншот: http://127.0.0.1:8080/screenshots</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #333; margin-top: 0; }
        .info { color: #666; margin: 16px 0; }
        .url { 
            background: #f0f0f0; 
            padding: 12px; 
            border-radius: 4px; 
            font-family: monospace;
            word-break: break-all;
        }
        .placeholder {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px;
            text-align: center;
            border-radius: 8px;
            margin: 20px 0;
        }
        .placeholder h2 { margin: 0 0 10px 0; }
        .btn {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            margin-top: 20px;
        }
        .btn:hover { background: #5a6fd6; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📸 Скриншот страницы</h1>
        <div class="info">
            <strong>Дата создания:</strong> 18.03.2026 09:32:41<br>
            <strong>Страница:</strong>
        </div>
        <div class="url">http://127.0.0.1:8080/screenshots</div>
        
        <div class="placeholder">
            <h2>Скриншот в разработке</h2>
            <p>Для генерации скриншотов необходимо настроить внешний API</p>
            <p>Например: <a href="https://api.screenshotmachine.com" target="_blank">ScreenshotMachine</a>, 
                       <a href="https://www.browserless.io" target="_blank">Browserless</a></p>
        </div>
        
        <a href="http://127.0.0.1:8080/screenshots" target="_blank" class="btn">Открыть страницу →</a>
    </div>
</body>
</html>
