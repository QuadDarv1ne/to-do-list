<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="rgba(255,255,255,0.1)"/>
  <circle cx="1100" cy="530" r="120" fill="rgba(255,255,255,0.08)"/>
  <circle cx="900" cy="150" r="60" fill="rgba(255,255,255,0.12)"/>
  
  <!-- Main content container -->
  <g transform="translate(100, 180)">
    <!-- Icon/Logo -->
    <rect x="0" y="0" width="120" height="120" rx="24" fill="rgba(255,255,255,0.2)"/>
    <path d="M30 60 L55 85 L90 35" stroke="white" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Title -->
    <text x="160" y="45" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="white" filter="url(#shadow)">
      CRM система
    </text>
    
    <!-- Subtitle -->
    <text x="160" y="95" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="rgba(255,255,255,0.9)">
      Анализ продаж
    </text>
    
    <!-- Divider line -->
    <line x1="0" y1="140" x2="1000" y2="140" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    
    <!-- Description -->
    <text x="0" y="190" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.85)">
      Управление задачами и продажами
    </text>
    <text x="0" y="230" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.85)">
      для ООО «Дальневосточный фермер»
    </text>
    
    <!-- Features badges -->
    <g transform="translate(0, 280)">
      <rect x="0" y="0" width="180" height="50" rx="25" fill="rgba(255,255,255,0.15)"/>
      <text x="90" y="32" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="white" text-anchor="middle">
        ✓ Задачи
      </text>
      
      <rect x="200" y="0" width="180" height="50" rx="25" fill="rgba(255,255,255,0.15)"/>
      <text x="290" y="32" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="white" text-anchor="middle">
        📊 CRM
      </text>
      
      <rect x="400" y="0" width="180" height="50" rx="25" fill="rgba(255,255,255,0.15)"/>
      <text x="490" y="32" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="white" text-anchor="middle">
        📈 Отчёты
      </text>
      
      <rect x="600" y="0" width="180" height="50" rx="25" fill="rgba(255,255,255,0.15)"/>
      <text x="690" y="32" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="white" text-anchor="middle">
        👥 Команда
      </text>
    </g>
  </g>
  
  <!-- Footer -->
  <g transform="translate(100, 550)">
    <text x="0" y="0" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.7)">
      crm.dvfarm.ru
    </text>
    <text x="1000" y="0" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.7)" text-anchor="end">
      Версия 3.2.0
    </text>
  </g>
</svg>
